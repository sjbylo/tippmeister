{% extends "base.html" %}
{% block title %}{{ _('Register') }} - Der Tippmeister{% endblock %}
{% block content %}
<div class="auth-container">
	<h2>{{ _('Join the Game!') }}</h2>
	<form method="POST" class="auth-form">
		<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
		<div class="form-group">
			<label for="email">{{ _('Email') }}</label>
			<input type="email" id="email" name="email" value="{{ email }}" required autofocus>
		</div>
		<div class="form-group">
			<label for="display_name">{{ _('Display Name') }} {{ _('(3-12 chars, letters & numbers only)') }}</label>
			<input type="text" id="display_name" name="display_name" value="{{ display_name }}"
				   minlength="3" maxlength="12" pattern="[A-Za-z0-9]+" required>
			<small>{{ _('e.g. Phil, FootyKing, BallMad') }}</small>
		</div>
		<div class="form-group">
			<label for="password">{{ _('Password') }} {{ _('(min 8 chars, must include letter & number)') }}</label>
			<input type="password" id="password" name="password" minlength="8" required>
		</div>
		<div class="form-group">
			<label for="password2">{{ _('Confirm Password') }}</label>
			<input type="password" id="password2" name="password2" minlength="8" required>
		</div>
		<input type="hidden" id="detected_tz" name="timezone" value="">
		<button type="submit" class="btn btn-primary">{{ _('Register') }}</button>
	</form>
	<p class="auth-link">{{ _('Already have an account?') }} <a href="{{ url_for('auth.login') }}">{{ _('Login') }}</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
try {
	var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
	if (tz) document.getElementById('detected_tz').value = tz;
} catch(e) {}
</script>
{% endblock %}
